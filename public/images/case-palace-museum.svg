<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1E1812"/>
  <!-- Traditional roof -->
  <path d="M100,220 Q400,100 700,220" stroke="#BA9972" stroke-width="3" fill="none"/>
  <path d="M130,220 Q400,120 670,220" fill="#353535"/>
  <!-- Pillars -->
  <rect x="200" y="220" width="20" height="200" fill="#424242"/>
  <rect x="350" y="220" width="20" height="200" fill="#424242"/>
  <rect x="430" y="220" width="20" height="200" fill="#424242"/>
  <rect x="580" y="220" width="20" height="200" fill="#424242"/>
  <!-- Artifacts -->
  <circle cx="280" cy="320" r="30" stroke="#BA9972" stroke-width="2" fill="#2C241B"/>
  <circle cx="510" cy="320" r="30" stroke="#BA9972" stroke-width="2" fill="#2C241B"/>
  <!-- Audio waves from artifacts -->
  <g opacity="0.5">
    <path d="M280,280 Q280,260 300,260" stroke="#FEE3C4" stroke-width="1.5" fill="none"/>
    <path d="M280,275 Q280,250 310,250" stroke="#FEE3C4" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>
  <!-- Visitor with phone -->
  <circle cx="400" cy="340" r="15" fill="#595959"/>
  <rect x="390" y="360" width="20" height="40" rx="4" fill="#595959"/>
  <rect x="415" y="365" width="12" height="20" rx="3" fill="#BA9972" opacity="0.6"/>
  <text x="400" y="470" text-anchor="middle" fill="#C4C4C4" font-family="sans-serif" font-size="14">國立故宮博物院 — 多語語音導覽</text>
</svg>
