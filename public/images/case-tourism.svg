<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#0F1A0F"/>
  <!-- Mountains -->
  <polygon points="0,500 200,200 400,500" fill="#1A3D1A"/>
  <polygon points="200,500 450,150 700,500" fill="#0D2B0D"/>
  <polygon points="500,500 700,250 800,500" fill="#1A3D1A"/>
  <!-- Sun -->
  <circle cx="600" cy="150" r="50" fill="#BA9972" opacity="0.8"/>
  <circle cx="600" cy="150" r="70" fill="#BA9972" opacity="0.15"/>
  <!-- Lake -->
  <ellipse cx="400" cy="480" rx="350" ry="60" fill="#1A2A3D" opacity="0.6"/>
  <!-- GPS pin -->
  <g transform="translate(350, 280)">
    <path d="M0,-40 C-22,-40 -40,-22 -40,0 C-40,30 0,60 0,60 S40,30 40,0 C40,-22 22,-40 0,-40Z" fill="#82D28A" opacity="0.8"/>
    <circle cx="0" cy="-5" r="12" fill="#0F1A0F"/>
  </g>
  <!-- Trail dots -->
  <circle cx="280" cy="400" r="4" fill="#82D28A" opacity="0.5"/>
  <circle cx="310" cy="380" r="4" fill="#82D28A" opacity="0.5"/>
  <circle cx="340" cy="350" r="4" fill="#82D28A" opacity="0.5"/>
  <circle cx="350" cy="310" r="4" fill="#82D28A" opacity="0.7"/>
  <!-- Phone outline -->
  <rect x="500" y="300" width="120" height="200" rx="16" stroke="#82D28A" stroke-width="2" fill="#191919" opacity="0.8"/>
  <rect x="510" y="320" width="100" height="140" rx="4" fill="#353535" opacity="0.5"/>
  <circle cx="560" cy="480" r="8" stroke="#82D28A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" fill="#C4C4C4" font-family="sans-serif" font-size="16">觀光景點 GPS 導覽</text>
</svg>
