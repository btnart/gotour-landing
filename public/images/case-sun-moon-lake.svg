<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0A1A0A"/>
  <!-- Sky gradient -->
  <rect width="800" height="300" fill="url(#sky)"/>
  <!-- Mountains -->
  <polygon points="0,300 150,150 300,300" fill="#1A3D1A"/>
  <polygon points="200,300 400,120 600,300" fill="#0D2B0D"/>
  <polygon points="500,300 680,180 800,300" fill="#1A3D1A"/>
  <!-- Lake -->
  <ellipse cx="400" cy="350" rx="380" ry="80" fill="#0A2A3D"/>
  <!-- Reflection shimmer -->
  <line x1="300" y1="340" x2="350" y2="340" stroke="#82D28A" stroke-width="1" opacity="0.2"/>
  <line x1="420" y1="355" x2="480" y2="355" stroke="#82D28A" stroke-width="1" opacity="0.15"/>
  <line x1="250" y1="360" x2="290" y2="360" stroke="#82D28A" stroke-width="1" opacity="0.1"/>
  <!-- Sun -->
  <circle cx="650" cy="100" r="35" fill="#EFCE5A" opacity="0.6"/>
  <!-- GPS route dots -->
  <circle cx="200" cy="290" r="5" fill="#82D28A" opacity="0.8"/>
  <circle cx="300" cy="270" r="5" fill="#82D28A" opacity="0.8"/>
  <circle cx="420" cy="260" r="5" fill="#82D28A" opacity="0.8"/>
  <circle cx="550" cy="275" r="5" fill="#82D28A" opacity="0.8"/>
  <circle cx="650" cy="285" r="5" fill="#82D28A" opacity="0.8"/>
  <!-- Route line -->
  <polyline points="200,290 300,270 420,260 550,275 650,285" stroke="#82D28A" stroke-width="2" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1520"/>
      <stop offset="100%" stop-color="#0A1A0A"/>
    </linearGradient>
  </defs>
  <text x="400" y="460" text-anchor="middle" fill="#C4C4C4" font-family="sans-serif" font-size="14">日月潭風景區 — GPS 戶外導覽</text>
</svg>
