<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1E1812"/>
  <!-- Classical building facade -->
  <rect x="150" y="200" width="500" height="220" fill="#353535"/>
  <!-- Dome -->
  <ellipse cx="400" cy="200" rx="150" ry="60" fill="#424242"/>
  <ellipse cx="400" cy="200" rx="100" ry="40" fill="#353535"/>
  <!-- Columns -->
  <rect x="190" y="210" width="15" height="200" fill="#4D4D4D"/>
  <rect x="260" y="210" width="15" height="200" fill="#4D4D4D"/>
  <rect x="525" y="210" width="15" height="200" fill="#4D4D4D"/>
  <rect x="595" y="210" width="15" height="200" fill="#4D4D4D"/>
  <!-- AI Chatbot bubble -->
  <g transform="translate(400, 120)">
    <rect x="-100" y="-40" width="200" height="60" rx="12" fill="#7A654B" opacity="0.7"/>
    <text x="0" y="-10" text-anchor="middle" fill="#FEE3C4" font-family="sans-serif" font-size="11">🤖 AI 客服已回覆 85% 問題</text>
    <!-- Chat dots -->
    <circle cx="-15" cy="10" r="3" fill="#FEE3C4" opacity="0.5"/>
    <circle cx="0" cy="10" r="3" fill="#FEE3C4" opacity="0.7"/>
    <circle cx="15" cy="10" r="3" fill="#FEE3C4" opacity="0.9"/>
  </g>
  <!-- Fountain/pool -->
  <ellipse cx="400" cy="440" rx="120" ry="20" fill="#2C241B"/>
  <text x="400" y="480" text-anchor="middle" fill="#C4C4C4" font-family="sans-serif" font-size="14">奇美博物館 — AI 智慧客服</text>
</svg>
