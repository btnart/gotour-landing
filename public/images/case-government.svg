<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#1A1500"/>
  <!-- City skyline -->
  <rect x="80" y="250" width="80" height="250" fill="#353535"/>
  <rect x="180" y="200" width="60" height="300" fill="#424242"/>
  <rect x="260" y="280" width="100" height="220" fill="#353535"/>
  <rect x="380" y="180" width="70" height="320" fill="#4D4D4D"/>
  <rect x="470" y="230" width="90" height="270" fill="#353535"/>
  <rect x="580" y="260" width="60" height="240" fill="#424242"/>
  <rect x="660" y="220" width="80" height="280" fill="#353535"/>
  <!-- Windows glow -->
  <g fill="#EFCE5A" opacity="0.3">
    <rect x="95" y="270" width="15" height="12" rx="2"/>
    <rect x="120" y="270" width="15" height="12" rx="2"/>
    <rect x="95" y="300" width="15" height="12" rx="2"/>
    <rect x="120" y="300" width="15" height="12" rx="2"/>
    <rect x="195" y="220" width="12" height="10" rx="2"/>
    <rect x="215" y="220" width="12" height="10" rx="2"/>
    <rect x="195" y="250" width="12" height="10" rx="2"/>
    <rect x="395" y="200" width="12" height="10" rx="2"/>
    <rect x="420" y="200" width="12" height="10" rx="2"/>
    <rect x="395" y="230" width="12" height="10" rx="2"/>
    <rect x="420" y="230" width="12" height="10" rx="2"/>
  </g>
  <!-- Network lines -->
  <g stroke="#EFCE5A" stroke-width="1" opacity="0.3">
    <line x1="120" y1="300" x2="210" y2="240"/>
    <line x1="210" y1="240" x2="410" y2="210"/>
    <line x1="410" y1="210" x2="510" y2="260"/>
    <line x1="510" y1="260" x2="700" y2="250"/>
  </g>
  <!-- Connection dots -->
  <circle cx="120" cy="300" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="210" cy="240" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="410" cy="210" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="510" cy="260" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="700" cy="250" r="6" fill="#EFCE5A" opacity="0.6"/>
  <!-- Data chart -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#353535" opacity="0.8"/>
    <rect x="20" y="50" width="15" height="20" rx="2" fill="#EFCE5A" opacity="0.6"/>
    <rect x="45" y="35" width="15" height="35" rx="2" fill="#EFCE5A" opacity="0.7"/>
    <rect x="70" y="25" width="15" height="45" rx="2" fill="#EFCE5A" opacity="0.8"/>
    <rect x="95" y="15" width="15" height="55" rx="2" fill="#EFCE5A" opacity="0.9"/>
    <rect x="120" y="20" width="15" height="50" rx="2" fill="#EFCE5A" opacity="0.7"/>
    <rect x="145" y="10" width="15" height="60" rx="2" fill="#EFCE5A"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" fill="#C4C4C4" font-family="sans-serif" font-size="16">城市導覽數據平台</text>
</svg>
