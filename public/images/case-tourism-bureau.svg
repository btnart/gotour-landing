<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#1A1500"/>
  <!-- Map grid -->
  <g stroke="#EFCE5A" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="500"/>
    <line x1="320" y1="0" x2="320" y2="500"/>
    <line x1="480" y1="0" x2="480" y2="500"/>
    <line x1="640" y1="0" x2="640" y2="500"/>
  </g>
  <!-- Taiwan outline (simplified) -->
  <path d="M380,80 Q420,100 430,150 Q440,200 450,250 Q445,300 430,350 Q410,400 380,420 Q360,400 350,350 Q340,300 345,250 Q350,200 360,150 Q365,100 380,80Z" fill="#353535" stroke="#EFCE5A" stroke-width="1.5" opacity="0.6"/>
  <!-- City dots -->
  <circle cx="370" cy="150" r="8" fill="#EFCE5A" opacity="0.8"/>
  <circle cx="385" cy="200" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="400" cy="260" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="420" cy="310" r="6" fill="#EFCE5A" opacity="0.6"/>
  <circle cx="390" cy="370" r="6" fill="#EFCE5A" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="370" y1="150" x2="385" y2="200" stroke="#EFCE5A" stroke-width="1" opacity="0.3"/>
  <line x1="385" y1="200" x2="400" y2="260" stroke="#EFCE5A" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="260" x2="420" y2="310" stroke="#EFCE5A" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="310" x2="390" y2="370" stroke="#EFCE5A" stroke-width="1" opacity="0.3"/>
  <!-- Dashboard panel -->
  <rect x="530" y="100" width="220" height="150" rx="12" fill="#353535" opacity="0.8"/>
  <text x="560" y="130" fill="#EFCE5A" font-family="sans-serif" font-size="11" opacity="0.8">觀光數據總覽</text>
  <rect x="550" y="145" width="40" height="30" rx="4" fill="#EFCE5A" opacity="0.2"/>
  <rect x="600" y="145" width="40" height="30" rx="4" fill="#EFCE5A" opacity="0.3"/>
  <rect x="650" y="145" width="40" height="30" rx="4" fill="#EFCE5A" opacity="0.2"/>
  <!-- Mini bar chart -->
  <rect x="550" y="210" width="15" height="20" rx="2" fill="#EFCE5A" opacity="0.4"/>
  <rect x="575" y="200" width="15" height="30" rx="2" fill="#EFCE5A" opacity="0.5"/>
  <rect x="600" y="190" width="15" height="40" rx="2" fill="#EFCE5A" opacity="0.6"/>
  <rect x="625" y="195" width="15" height="35" rx="2" fill="#EFCE5A" opacity="0.5"/>
  <rect x="650" y="185" width="15" height="45" rx="2" fill="#EFCE5A" opacity="0.7"/>
  <text x="400" y="470" text-anchor="middle" fill="#C4C4C4" font-family="sans-serif" font-size="14">交通部觀光署 — 全台景點串聯</text>
</svg>
